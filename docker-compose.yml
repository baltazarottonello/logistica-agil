services:
  # ─────────────────────────────────────────
  # BASE DE DATOS
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: logistica_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # BACKEND (Node.js + Express)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    container_name: logistica_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────
  # FRONTEND (React + Vite — modo preview)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    container_name: logistica_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
